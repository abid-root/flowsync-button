  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description" content="A clean static UI library with curated buttons, premium masterpieces, toggles and physical click-state buttons.">

  <meta name="author" content="Abid Hasan">
  <meta name="theme-color" content="#06090f">
  <meta name="color-scheme" content="dark light">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="canonical" href="https://abid-root.github.io/flowsync-button/library.html">
  <link rel="icon" type="image/png" href="common/favicon-192.png">
  <link rel="apple-touch-icon" href="common/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="FlowSync">
  <meta property="og:title" content="FlowSync — Button Library">
  <meta property="og:description" content="A clean static UI library with curated buttons, premium masterpieces, toggles and physical click-state buttons.">
  <meta property="og:url" content="https://abid-root.github.io/flowsync-button/library.html">
  <meta property="og:image" content="https://abid-root.github.io/flowsync-button/common/og-button.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">

  <script type="application/ld+json">{"@context": "https://schema.org", "@type": "WebSite", "name": "FlowSync Button UI Library", "url": "https://abid-root.github.io/flowsync-button/", "description": "A clean static UI library with curated buttons, premium masterpieces, toggles and physical click-state buttons.", "author": {"@type": "Person", "name": "Abid Hasan"}}</script>

<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="library">
  <div class="ambient" aria-hidden="true"></div>

  <header class="topbar">
    <a class="brand" href="index.html" aria-label="FlowSync home">
      <img id="brandLogo" class="brand-logo" src="common/blackone.webp" alt="FlowSync logo" width="44" height="44" data-dark="common/blackone.webp" data-light="common/whiteone.webp" decoding="async">
      <span><strong>FlowSync</strong><small>Library</small></span>
    </a>
    <nav class="toplinks" aria-label="Primary navigation">
      <a href="index.html">Lobby</a><a href="library.html" aria-current="page">Library</a><a href="masterpieces/index.html">Masterpieces</a><a href="toggles/index.html">Toggles</a><a href="physical-buttons/index.html">Physical</a><a href="source-guide.html">Guide</a>
      <a href="https://abid-root.github.io/contact/">Contact</a>
      
      <button class="theme-btn" id="themeToggle" type="button" aria-label="Toggle theme"><span class="theme-icon sun" aria-hidden="true">☀</span><span class="theme-icon moon" aria-hidden="true">☾</span></button>
    </nav>
  </header>

  <main class="library-layout">
    <aside class="filter-dock" aria-label="Library filters">
      <p class="label">filter</p>
      <h2>Library</h2>
      <label>
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="checkout, deploy, login..." autocomplete="off">
      </label>
      <label>
        <span>Category</span>
        <select id="categorySelect"></select>
      </label>
      <label>
        <span>Style</span>
        <select id="styleSelect">
          <option value="all">All styles</option>
          <option value="glass">Glass</option>
          <option value="terminal">Terminal</option>
          <option value="neon">Neon</option>
          <option value="outline">Outline</option>
          <option value="depth">Depth</option>
          <option value="liquid">Liquid</option>
          <option value="minimal">Minimal</option>
        </select>
      </label>
      <button class="dock-random" id="randomBtn" type="button">Shuffle</button>
      <div class="filter-meta">
        <strong id="visibleCount">0</strong>
        <span id="filterLabel">shown now</span>
      </div>
    </aside>

    <section class="library-main">
      <div class="library-head">
        <div>
          <p class="label">curated source library</p>
          <h1>Useful buttons, not filler.</h1>
        </div>
        <p>Search, filter, preview and copy the source. The old mass library has been reduced to stronger reusable categories.</p>
      </div>

      <div class="button-grid" id="buttonGrid"></div>

      <div class="load-row">
        <button class="load-more" id="loadMoreBtn" type="button">Load more</button>
        <span id="pagerText"></span>
      </div>
    </section>
  </main>

  <dialog class="source-dialog" id="sourceDialog">
    <form method="dialog" class="dialog-head">
      <div>
        <p class="label">copy source</p>
        <h2 id="dialogTitle">Button source</h2>
      </div>
      <button class="dialog-close" type="submit" aria-label="Close source dialog"></button>
    </form>

    <div class="dialog-preview" id="dialogPreview"></div>

    <div class="code-toolbar">
      <button class="code-tab active" type="button" data-tab="html">HTML</button>
      <button class="code-tab" type="button" data-tab="css">CSS</button>
      <button class="code-tab" type="button" data-tab="js">JS</button>
      <button class="copy-code" id="copyCode" type="button">Copy</button>
    </div>

    <pre class="code-box"><code id="codeBlock"></code></pre>
  </dialog>

  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/custom-dropdowns.js"></script>
</body>
</html>
